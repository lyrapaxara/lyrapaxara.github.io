# Each top-level entry is one tile in the gallery.
# An entry is either a SINGLE PIECE or a SERIES.
#
# SINGLE PIECE — one image per tile.
# SERIES — one cover tile, click reveals a sub-grid.
#
# Optional fields on any entry: year, medium, description, thumb.
# Image paths are relative to site root.

# ===== Series with simple paths =====
# Sub-pieces are just file paths. They share the series title in the lightbox.
- title: Percurso biográfico
  cover: /assets/img/art/identcover.jpg
  thumb: /assets/img/art/thumbs/identcover.jpg
  year: 2026
  medium: aguarela - pintura óleo
  description: >
    Seis perspetivas de uma vida...
  images:
    - /assets/img/art/ident1.jpg
    - /assets/img/art/ident2.jpg
    - /assets/img/art/ident3.jpg
    - /assets/img/art/ident4.jpg
    - /assets/img/art/ident5.jpg
    - /assets/img/art/ident6.jpg
    
