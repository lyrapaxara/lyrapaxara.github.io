{%- comment -%}
  Newsletter signup form — uses Buttondown.
  Replace YOUR-USERNAME with your Buttondown newsletter username.
{%- endcomment -%}

<div class="newsletter-box">
  <form action="https://buttondown.com/api/emails/embed-subscribe/YOUR-USERNAME"
        method="post"
        target="popupwindow"
        onsubmit="window.open('https://buttondown.com/YOUR-USERNAME', 'popupwindow')"
        class="newsletter-form">
    <label for="bd-email" class="visually-hidden">Email</label>
    <input type="email"
           name="email"
           id="bd-email"
           placeholder="email@…"
           required>
    <button type="submit">→</button>
  </form>
</div>
